name: Publish MVE APK

# Builds an installable (debug-signed) APK on every push to main and attaches it
# to a rolling, non-draft "android-preview" release, so the download URL is
# always the same:
#   https://github.com/ether4o4/NeverSoft-Mobile-Desktop/releases/download/android-preview/mve.apk
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      asset_name:
        description: 'APK file name'
        required: false
        default: mve.apk

permissions:
  contents: write

env:
  # The build bundles a standalone-Android proot so the app installs full Alpine
  # Linux. Default source is UserLAnd's purpose-built proot (one per ABI, laid
  # out as <base>/<abi>/assets/proot). Override with a repo variable
  # PROOT_BASE_URL pointing at your own host using the same layout. If a source
  # is unreachable, that ABI ships the built-in toybox shell instead.
  PROOT_BASE_URL: ${{ vars.PROOT_BASE_URL || 'https://raw.githubusercontent.com/CypherpunkArmory/UserLAnd-Assets-Support/master' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Bundle proot for full Alpine
        continue-on-error: true
        run: |
          set +e
          ok=0
          for abi in arm64-v8a armeabi-v7a x86_64; do
            dir="android/app/src/main/jniLibs/$abi"; mkdir -p "$dir"
            url="$PROOT_BASE_URL/$abi/assets/proot"
            echo "→ $abi: $url"
            if curl -fsSL --retry 2 "$url" -o "$dir/libproot.so" && [ -s "$dir/libproot.so" ]; then
              # Reject HTML/JSON error bodies masquerading as the binary (must be an ELF).
              if head -c4 "$dir/libproot.so" | grep -q $'\x7fELF'; then
                chmod +x "$dir/libproot.so"
                echo "  ✓ proot bundled ($(wc -c <"$dir/libproot.so") bytes)"; ok=1
              else
                echo "  ⚠ not an ELF — discarding, ships toybox"; rm -f "$dir/libproot.so"
              fi
            else
              echo "  ⚠ unreachable — ships toybox"; rm -f "$dir/libproot.so"
            fi
          done
          [ "$ok" = 1 ] && echo "proot bundled → app installs full Alpine" \
                        || echo "no proot bundled → app ships toybox shell (fully functional)"
          exit 0

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-configuration-cache

      - name: Stage APK
        env:
          ASSET_NAME: ${{ github.event.inputs.asset_name || 'mve.apk' }}
        run: |
          mkdir -p dist
          # Prefer a universal APK; otherwise take the largest debug APK built.
          APK=$(ls android/app/build/outputs/apk/debug/*universal*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls -S android/app/build/outputs/apk/debug/*.apk | head -1)
          fi
          echo "Staging $APK -> dist/${ASSET_NAME}"
          cp "$APK" "dist/${ASSET_NAME}"

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME: ${{ github.event.inputs.asset_name || 'mve.apk' }}
        run: |
          # Refresh the rolling release so the asset (and its stable URL) updates.
          gh release delete android-preview --yes --cleanup-tag 2>/dev/null || true
          gh release create android-preview "dist/${ASSET_NAME}" \
            --title "MVE — Android Preview" \
            --notes "Rolling debug-signed APK: split-screen AI chat + live terminal, on-device or cloud models. Enable 'Install unknown apps' to sideload." \
            --latest
